<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Iqra</title>
    <style>
        /* Base Styling */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Golden Sparkling Background */
        .sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, #ffd700 1px, transparent 1px),
                              radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 50px 50px, 100px 100px;
            opacity: 0.4;
            animation: moveSparkles 10s linear infinite;
            z-index: 1;
        }

        @keyframes moveSparkles {
            0% { background-position: 0 0; }
            100% { background-position: 500px 1000px; }
        }

        /* Bright Glowing Glass Container */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 15, 15, 0.9);
            padding: 50px 40px;
            border-radius: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px #ffd700, inset 0 0 15px rgba(255, 215, 0, 0.3);
            text-align: center;
            width: 320px;
            animation: pulseGlow 2.5s infinite alternate;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 20px #ffd700; }
            to { box-shadow: 0 0 45px #ffea00, 0 0 10px #fff; }
        }

        h1 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #ffea00;
        }

        /* Password Input Area */
        .input-group {
            margin-bottom: 25px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="password"]:focus {
            box-shadow: 0 0 15px #ffea00;
            border-color: #fff;
        }

        /* Golden Unlock Button */
        .unlock-btn {
            background: linear-gradient(45deg, #b8860b, #ffd700, #ffea00);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: 0.4s;
        }

        .unlock-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ffea00;
            letter-spacing: 3px;
        }

        /* Error Message */
        #errorMsg {
            color: #ff4d4d;
            margin-top: 20px;
            font-size: 14px;
            display: none;
            text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div class="sparkles"></div>

    <div class="login-card">
        <h1>IQRA enter the password.</h1>
        
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Enter Secret Code">
        </div>

        <button class="unlock-btn" onclick="validate()">Unlock</button>

        <p id="errorMsg">Galat Password! Dubaara koshish karein.</p>
    </div>

    <script>
        function validate() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');

            // Password "DAlubnaDH" hidden as ASCII number codes
            // D=68, A=65, l=108, u=117, b=98, n=110, a=97, D=68, H=72
            const secretCodes = [68, 65, 108, 117, 98, 110, 97, 68, 72];
            
            let hiddenPass = "";
            for(let i = 0; i < secretCodes.length; i++){
                hiddenPass += String.fromCharCode(secretCodes[i]);
            }

            if (input === hiddenPass) {
                // Sahi password hone par Page 2 par redirect hoga
                window.location.href = "page2.html";
            } else {
                error.style.display = "block";
                setTimeout(() => { error.style.display = "none"; }, 3000);
            }
        }
    </script>

</body>
</html>
